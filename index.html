<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Іріна Лісогор - Content Photographer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>

    <main class="hero">
        <div class="hero__inner">
            <header class="header">
                <a href="#" class="nav__link-portfolio">Портфоліо</a>
                <a href="#" class="nav__link-about">Про мене</a>
                <a href="#" class="nav__link-services">Послуги та ціни</a>
                <a href="#" class="nav__link-contacts">Контакти</a>

                <div class="socials">
                    <a href="#" class="socials__link" style="order: 0;"><img src="icon-telegram.svg" alt="Telegram"></a>
                    <a href="#" class="socials__link" style="order: 1;"><img src="icon-instagram.svg"
                            alt="Instagram"></a>
                    <a href="#" class="socials__link" style="order: 2;"><img src="icon-viber.svg" alt="Viber"></a>
                </div>
            </header>

            <div class="hero__content-photographer">
                <img src="title_accent.svg" class="hero__title-accent" alt="Content">
                <div class="hero__title-main">Photographer</div>
            </div>

            <div class="hero__description">
                <div class="hero__desc-line1">Допоможу створити візуал мрії</div>
                <div class="hero__desc-line2">Твоя історія — мій кадр</div>
            </div>

            <div class="hero__author-name">
                <div class="hero__author-first">Іріна</div>
                <div class="hero__author-last">Лісогор</div>
            </div>

            <a href="#" class="hero__button-label">
                <div class="hero__button-text">Портфоліо</div>
            </a>
        </div>
    </main>

</body>

</html>
